- name: copying content from rabbitmq.repo
  ansible.builtin.copy:
    src: rabbitmq.repo
    dest: /etc/yum.repos.d/rabbitmq.repo
- name: installing rabbitmq
  ansible.builtin.dnf:
    name: rabbitmq-server
    state: present
- name: starting and enabling rabbitmq
  ansible.builtin.service:
    name: rabbitmq-server
    state: started
    enabled: yes
- name: install botocore and boto3
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
  - boto3
  - botocore
- name: adding user
  community.rabbitmq.rabbitmq_user:
    user: roboshop
    password: "{{ USER_PASSWORD  }}"
    vhost: /
    configure_priv: .*
    read_priv: .*
    write_priv: .*
    state: present